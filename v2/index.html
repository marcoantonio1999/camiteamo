<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Camila · GSAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #1a0612;
      --bg-2: #2b0a1f;
      --bg-3: #3a0d27;
      --accent: #ff4f7d;
      --accent-2: #ff7aa2;
      --accent-soft: #ffd1de;
      --gold: #ffd9a8;
      --text: #fff3f6;
      --text-soft: #f3c9d4;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: radial-gradient(120% 80% at 50% 0%, var(--bg-3) 0%, var(--bg-2) 45%, var(--bg-1) 100%);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .stars,
    .bokeh,
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars { z-index: 0; }
    .bokeh { z-index: 1; }
    .vignette {
      z-index: 2;
      background:
        radial-gradient(60% 60% at 50% 35%, transparent 0%, rgba(8, 2, 8, 0.55) 100%),
        radial-gradient(120% 120% at 50% 100%, rgba(255, 79, 125, 0.08) 0%, transparent 60%);
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.6;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.7);
    }

    .bokeh-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 153, 184, 0.55), rgba(255, 79, 125, 0));
      filter: blur(1px);
    }

    .stage {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    /* INTRO ------------------------------------------------------- */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 28px;
      background: radial-gradient(60% 60% at 50% 50%, rgba(255, 79, 125, 0.18), transparent 70%);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .intro-heart {
      width: 150px;
      height: 150px;
      filter: drop-shadow(0 0 30px rgba(255, 79, 125, 0.55));
    }
    .intro-heart svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .intro-hint {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      color: var(--text-soft);
      letter-spacing: 0.04em;
      opacity: 0.85;
    }

    .intro-hint span {
      display: inline-block;
      will-change: transform, opacity;
    }

    /* MAIN ------------------------------------------------------- */
    .scene {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 28px;
      align-items: center;
      opacity: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 10px 4px;
    }

    .eyebrow {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      color: var(--accent-2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
    }

    .headline {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      line-height: 1.18;
      color: #fff;
      margin: 0;
      letter-spacing: 0.005em;
      text-wrap: balance;
    }

    .headline .word {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
    }
    .headline .word-inner {
      display: inline-block;
      will-change: transform;
    }

    .headline em {
      color: var(--accent-2);
      font-style: italic;
      font-weight: 500;
    }

    .body-text {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.55;
      color: var(--text-soft);
      max-width: 460px;
      margin: 0;
    }

    .body-text .char { display: inline-block; will-change: transform, opacity; }

    .counter-card {
      margin-top: 6px;
      padding: 18px 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 79, 125, 0.16), rgba(255, 121, 162, 0.05));
      border: 1px solid rgba(255, 209, 222, 0.18);
      backdrop-filter: blur(6px);
      max-width: 460px;
      opacity: 0;
      transform: translateY(20px);
    }

    .counter-label {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--accent-soft);
      margin: 0 0 8px;
      letter-spacing: 0.02em;
    }

    .counter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .counter-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .counter-num {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: clamp(1.3rem, 3vw, 1.7rem);
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .counter-unit {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-soft);
      opacity: 0.75;
    }

    .signature {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--accent-2);
      opacity: 0;
      letter-spacing: 0.05em;
    }

    /* TREE ------------------------------------------------------- */
    .tree-zone {
      position: relative;
      height: min(620px, 78vh);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .tree-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .tree-svg path {
      fill: none;
      stroke: #5a3320;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ground {
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 209, 222, 0.55) 30%, rgba(255, 209, 222, 0.55) 70%, transparent);
      transform-origin: center;
      transform: scaleX(0);
    }

    .bloom {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      will-change: transform, opacity;
      filter: drop-shadow(0 2px 5px rgba(255, 30, 80, 0.4));
    }
    .bloom svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .bloom.fallen {
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.3)) saturate(0.75) brightness(0.9);
    }

    .floating-heart {
      position: fixed;
      width: 14px;
      height: 14px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      filter: drop-shadow(0 0 6px rgba(255, 122, 162, 0.5));
    }
    .floating-heart svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    @media (max-width: 760px) {
      .scene {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .tree-zone {
        order: -1;
        height: min(440px, 52vh);
      }
      .panel {
        padding: 0 6px 24px;
      }
      .stage {
        padding: 30px 14px 50px;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="bokeh" id="bokeh" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="heart-shape" viewBox="0 0 32 28">
        <path d="M16 26 C 16 26, 2 17, 2 9 C 2 4, 6 1, 10 1 C 13 1, 15 3, 16 5 C 17 3, 19 1, 22 1 C 26 1, 30 4, 30 9 C 30 17, 16 26, 16 26 Z" />
      </symbol>
      <linearGradient id="heart-grad-1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ff7aa2" />
        <stop offset="100%" stop-color="#c8204c" />
      </linearGradient>
    </defs>
  </svg>

  <div class="intro" id="intro" role="button" aria-label="Comenzar">
    <div class="intro-heart" id="introHeart">
      <svg viewBox="0 0 32 28" preserveAspectRatio="xMidYMid meet">
        <use href="#heart-shape" fill="url(#heart-grad-1)" />
      </svg>
    </div>
    <div class="intro-hint" id="introHint">
      <span>toca</span> <span>el</span> <span>corazón</span>
    </div>
  </div>

  <main class="stage">
    <section class="scene" id="scene">
      <div class="panel">
        <span class="eyebrow" id="eyebrow">17 · 01 · 2026</span>
        <h1 class="headline" id="headline" data-text="Para Camila, *el amor de mi vida*."></h1>
        <p class="body-text" id="bodyText" data-text="Si pudiera elegir un lugar seguro, sería contigo. Eres lo más bonito que tengo, y cada segundo a tu lado florece."></p>

        <div class="counter-card" id="counterCard">
          <p class="counter-label">Te amo desde hace</p>
          <div class="counter-grid">
            <div class="counter-cell"><span class="counter-num" id="cDays">0</span><span class="counter-unit">días</span></div>
            <div class="counter-cell"><span class="counter-num" id="cHours">0</span><span class="counter-unit">horas</span></div>
            <div class="counter-cell"><span class="counter-num" id="cMins">0</span><span class="counter-unit">min</span></div>
            <div class="counter-cell"><span class="counter-num" id="cSecs">0</span><span class="counter-unit">seg</span></div>
          </div>
        </div>

        <span class="signature" id="signature">— y siempre tuyo</span>
      </div>

      <div class="tree-zone" id="treeZone">
        <svg class="tree-svg" id="treeSvg" viewBox="0 0 400 600" preserveAspectRatio="xMidYMax meet" aria-hidden="true"></svg>
        <div class="ground" id="ground"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    /* ===========================================================
       Romantic GSAP scene · v2 for Camila
       =========================================================== */
    const intro = document.getElementById('intro');
    const introHeart = document.getElementById('introHeart');
    const introHint = document.getElementById('introHint');
    const scene = document.getElementById('scene');
    const headline = document.getElementById('headline');
    const bodyText = document.getElementById('bodyText');
    const eyebrow = document.getElementById('eyebrow');
    const counterCard = document.getElementById('counterCard');
    const signature = document.getElementById('signature');
    const treeZone = document.getElementById('treeZone');
    const treeSvg = document.getElementById('treeSvg');
    const ground = document.getElementById('ground');

    /* ---------- Background ---------- */
    function buildStars() {
      const container = document.getElementById('stars');
      const count = window.innerWidth < 700 ? 60 : 110;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        const size = Math.random() * 2 + 1;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.opacity = (Math.random() * 0.6 + 0.2).toFixed(2);
        container.appendChild(s);
        gsap.to(s, {
          opacity: '+=0.4',
          duration: 1.4 + Math.random() * 2.5,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut',
          delay: Math.random() * 2,
        });
      }
    }

    function buildBokeh() {
      const container = document.getElementById('bokeh');
      const count = window.innerWidth < 700 ? 14 : 22;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.className = 'bokeh-dot';
        const size = 10 + Math.random() * 30;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.top = Math.random() * 100 + '%';
        dot.style.opacity = (Math.random() * 0.5 + 0.2).toFixed(2);
        container.appendChild(dot);
        gsap.to(dot, {
          y: (Math.random() * 80 - 40),
          x: (Math.random() * 60 - 30),
          duration: 6 + Math.random() * 6,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut',
        });
      }
    }

    /* ---------- Intro animation ---------- */
    function animateIntro() {
      gsap.set(introHeart, { scale: 0.6, opacity: 0 });
      const hintSpans = introHint.querySelectorAll('span');
      gsap.set(hintSpans, { y: 18, opacity: 0 });

      const tl = gsap.timeline();
      tl.to(introHeart, { scale: 1, opacity: 1, duration: 0.9, ease: 'elastic.out(1, 0.55)' })
        .to(introHeart, {
          scale: 1.08,
          duration: 0.9,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut',
        }, 0.9)
        .to(hintSpans, {
          y: 0,
          opacity: 0.85,
          duration: 0.55,
          stagger: 0.08,
          ease: 'power2.out',
        }, 0.4);
    }

    /* ---------- Procedural fractal tree ---------- */
    /*
      Recursive generation of branches as cubic-bezier SVG paths.
      Each segment knows its parent and depth; we draw level by level
      (parents before children) for an organic growth feel.
    */
    function makeRng(seed) {
      let t = seed >>> 0;
      return function () {
        t += 0x6D2B79F5;
        let n = Math.imul(t ^ (t >>> 15), 1 | t);
        n ^= n + Math.imul(n ^ (n >>> 7), 61 | n);
        return ((n ^ (n >>> 14)) >>> 0) / 4294967296;
      };
    }

    function buildTree() {
      treeSvg.innerHTML = '';
      const rng = makeRng(20260117);
      const segs = [];
      const tips = [];
      const MAX_LEVEL = 7;

      function branch(x0, y0, len, angle, width, level, parentIdx) {
        if (level > MAX_LEVEL || len < 4) {
          tips.push({ x: x0, y: y0, level });
          return;
        }
        // End point
        const x1 = x0 + Math.cos(angle) * len;
        const y1 = y0 - Math.sin(angle) * len;

        // Two control points for natural S-curve
        const perpX = -Math.sin(angle);
        const perpY = -Math.cos(angle);
        const bend1 = (rng() - 0.5) * len * 0.22;
        const bend2 = (rng() - 0.5) * len * 0.22;
        const c1x = x0 + Math.cos(angle) * len * 0.33 + perpX * bend1;
        const c1y = y0 - Math.sin(angle) * len * 0.33 + perpY * bend1;
        const c2x = x0 + Math.cos(angle) * len * 0.66 + perpX * bend2;
        const c2y = y0 - Math.sin(angle) * len * 0.66 + perpY * bend2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${x0.toFixed(1)} ${y0.toFixed(1)} C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${x1.toFixed(1)} ${y1.toFixed(1)}`);
        path.setAttribute('stroke-width', width.toFixed(2));
        // Subtle gradient: thicker (deeper) is darker
        const tone = Math.max(30, 70 - level * 6);
        path.setAttribute('stroke', `rgb(${tone + 28}, ${tone + 16}, ${tone})`);
        treeSvg.appendChild(path);
        const idx = segs.length;
        segs.push({ path, level, parentIdx, end: { x: x1, y: y1 }, start: { x: x0, y: y0 } });

        // Children — fractal split with organic variation
        const baseSplits = level < 2 ? 2 : (rng() > 0.55 ? 3 : 2);
        const spread = level < 2 ? 0.55 : (level < 4 ? 0.75 : 0.95);
        for (let i = 0; i < baseSplits; i++) {
          const offset = (i - (baseSplits - 1) / 2);
          const childAngle = angle + offset * (spread / Math.max(1, baseSplits - 1)) + (rng() - 0.5) * 0.22;
          const childLen = len * (0.68 + rng() * 0.14);
          const childWidth = Math.max(0.7, width * (0.66 + rng() * 0.08));
          branch(x1, y1, childLen, childAngle, childWidth, level + 1, idx);
        }

        // Occasional extra forward branch — gives bushiness
        if (level < 4 && rng() > 0.55) {
          const fAngle = angle + (rng() - 0.5) * 0.18;
          const fLen = len * (0.5 + rng() * 0.12);
          const fW = Math.max(0.7, width * 0.55);
          branch(x1, y1, fLen, fAngle, fW, level + 1, idx);
        }
      }

      // Trunk: a single first segment then split
      branch(200, 580, 110, Math.PI / 2 + 0.02, 14, 0, -1);
      // Cache tips on segs (tip = no children pointing to it)
      const hasChild = new Set();
      segs.forEach((s) => { if (s.parentIdx >= 0) hasChild.add(s.parentIdx); });
      segs.forEach((s, i) => { s.isTip = !hasChild.has(i); });

      return { segs, tips };
    }

    function preparePathDraw(segs) {
      segs.forEach((seg) => {
        const len = seg.path.getTotalLength();
        seg.path.style.strokeDasharray = len;
        seg.path.style.strokeDashoffset = len;
        seg.path.style.fill = 'none';
        seg.path.setAttribute('stroke-linecap', 'round');
        seg.path.setAttribute('stroke-linejoin', 'round');
        seg.length = len;
      });
    }

    /* ---------- Bloom (heart leaves) ---------- */
    const LEAF_PALETTES = [
      ['#ff5a85', '#b62049'],
      ['#ff7aa2', '#c93f6b'],
      ['#ff95b6', '#d75f81'],
      ['#ffb3c8', '#e07ea0'],
      ['#ff3d68', '#9c1235'],
      ['#ffd9a8', '#e6a36a'],
    ];

    function makeHeartSvg(colors) {
      const xmlns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(xmlns, 'svg');
      svg.setAttribute('viewBox', '0 0 32 28');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      const defs = document.createElementNS(xmlns, 'defs');
      const grad = document.createElementNS(xmlns, 'linearGradient');
      const gid = 'lg-' + Math.random().toString(36).slice(2, 8);
      grad.setAttribute('id', gid);
      grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
      grad.setAttribute('x2', '1'); grad.setAttribute('y2', '1');
      const s1 = document.createElementNS(xmlns, 'stop');
      s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', colors[0]);
      const s2 = document.createElementNS(xmlns, 'stop');
      s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', colors[1]);
      grad.appendChild(s1); grad.appendChild(s2);
      defs.appendChild(grad);
      svg.appendChild(defs);
      const use = document.createElementNS(xmlns, 'use');
      use.setAttribute('href', '#heart-shape');
      use.setAttribute('fill', `url(#${gid})`);
      svg.appendChild(use);
      return svg;
    }

    function placeBlooms(treeData) {
      const { segs } = treeData;
      // Only bloom on terminal branches (tips) and last 1-2 levels of branches
      const tipSegs = segs.filter((s) => s.isTip);
      const candidatePoints = [];

      // Anchor a heart at every tip
      tipSegs.forEach((seg) => candidatePoints.push({ x: seg.end.x, y: seg.end.y, weight: 1 }));

      // Sample points along upper branches (deeper level)
      segs.filter((s) => s.level >= 3).forEach((seg) => {
        const len = seg.path.getTotalLength();
        for (let k = 0; k < 2; k++) {
          const t = 0.45 + k * 0.35;
          const p = seg.path.getPointAtLength(len * t);
          candidatePoints.push({ x: p.x, y: p.y, weight: 0.6 });
        }
      });

      // Compute canopy center for synthetic filler hearts inside crown
      let minX = 400, maxX = 0, minY = 600, maxY = 0;
      tipSegs.forEach((s) => {
        if (s.end.x < minX) minX = s.end.x;
        if (s.end.x > maxX) maxX = s.end.x;
        if (s.end.y < minY) minY = s.end.y;
        if (s.end.y > maxY) maxY = s.end.y;
      });
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const rx = (maxX - minX) / 2 * 0.95;
      const ry = (maxY - minY) / 2 * 0.95;
      // Filler hearts inside the crown ellipse for fullness
      for (let i = 0; i < 60; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random());
        const x = cx + Math.cos(a) * rx * r;
        const y = cy + Math.sin(a) * ry * r;
        candidatePoints.push({ x, y, weight: 0.4, filler: true });
      }

      // Convert SVG coords to pixel positions relative to tree-zone
      const zoneRect = treeZone.getBoundingClientRect();
      const svgRect = treeSvg.getBoundingClientRect();
      const scaleX = svgRect.width / 400;
      const scaleY = svgRect.height / 600;
      const offsetX = svgRect.left - zoneRect.left;
      const offsetY = svgRect.top - zoneRect.top;

      const blooms = [];
      candidatePoints.forEach((p) => {
        const el = document.createElement('div');
        el.className = 'bloom';
        const colors = LEAF_PALETTES[Math.floor(Math.random() * LEAF_PALETTES.length)];
        const size = (p.filler ? 11 : 14) + Math.random() * 8;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        const jx = (Math.random() * 2 - 1) * (p.filler ? 16 : 8);
        const jy = (Math.random() * 2 - 1) * (p.filler ? 16 : 8);
        const px = offsetX + p.x * scaleX + jx;
        const py = offsetY + p.y * scaleY + jy;
        el.style.left = (px - size / 2) + 'px';
        el.style.top = (py - size / 2) + 'px';
        el.appendChild(makeHeartSvg(colors));
        treeZone.appendChild(el);
        blooms.push(el);
      });
      return blooms;
    }

    /* ---------- Text reveal helpers ---------- */
    function buildHeadline() {
      const raw = headline.dataset.text || '';
      // Marked emphasis: words between * *
      const parts = raw.split(/(\*[^*]+\*)/);
      headline.innerHTML = '';
      const wordsAll = [];
      parts.forEach((chunk) => {
        if (!chunk) return;
        const isEm = chunk.startsWith('*') && chunk.endsWith('*');
        const text = isEm ? chunk.slice(1, -1) : chunk;
        const tokens = text.split(/(\s+)/);
        tokens.forEach((t) => {
          if (!t) return;
          if (/^\s+$/.test(t)) {
            headline.appendChild(document.createTextNode(t));
            return;
          }
          const span = document.createElement('span');
          span.className = 'word';
          const inner = document.createElement('span');
          inner.className = 'word-inner';
          inner.textContent = t;
          if (isEm) {
            const emEl = document.createElement('em');
            emEl.appendChild(inner);
            span.appendChild(emEl);
          } else {
            span.appendChild(inner);
          }
          headline.appendChild(span);
          wordsAll.push(inner);
        });
      });
      return wordsAll;
    }

    function buildBodyText() {
      const raw = bodyText.dataset.text || '';
      bodyText.innerHTML = '';
      const chars = [];
      for (let i = 0; i < raw.length; i++) {
        const ch = raw[i];
        if (ch === ' ') {
          bodyText.appendChild(document.createTextNode(' '));
          continue;
        }
        const s = document.createElement('span');
        s.className = 'char';
        s.textContent = ch;
        bodyText.appendChild(s);
        chars.push(s);
      }
      return chars;
    }

    /* ---------- Counter ---------- */
    const startDate = new Date(2025, 10, 7, 0, 0, 0, 0);
    const cDays = document.getElementById('cDays');
    const cHours = document.getElementById('cHours');
    const cMins = document.getElementById('cMins');
    const cSecs = document.getElementById('cSecs');
    let lastVals = { d: -1, h: -1, m: -1, s: -1 };

    function pop(el) {
      gsap.fromTo(el,
        { scale: 1.18, color: '#ffd9a8' },
        { scale: 1, color: '#ffffff', duration: 0.55, ease: 'power2.out' });
    }

    function updateCounter() {
      const now = new Date();
      let diff = Math.max(0, now - startDate);
      const dayMs = 86400000;
      const hourMs = 3600000;
      const minuteMs = 60000;
      const d = Math.floor(diff / dayMs); diff %= dayMs;
      const h = Math.floor(diff / hourMs); diff %= hourMs;
      const m = Math.floor(diff / minuteMs); diff %= minuteMs;
      const s = Math.floor(diff / 1000);
      if (d !== lastVals.d) { cDays.textContent = d; pop(cDays); lastVals.d = d; }
      if (h !== lastVals.h) { cHours.textContent = h; pop(cHours); lastVals.h = h; }
      if (m !== lastVals.m) { cMins.textContent = m; pop(cMins); lastVals.m = m; }
      if (s !== lastVals.s) { cSecs.textContent = s; pop(cSecs); lastVals.s = s; }
    }

    /* ---------- Floating hearts loop ---------- */
    function spawnFloatingHeart() {
      const el = document.createElement('div');
      el.className = 'floating-heart';
      const palette = LEAF_PALETTES[Math.floor(Math.random() * LEAF_PALETTES.length)];
      el.appendChild(makeHeartSvg(palette));
      const size = 9 + Math.random() * 11;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      const startX = Math.random() * window.innerWidth;
      el.style.left = startX + 'px';
      el.style.top = (-30) + 'px';
      document.body.appendChild(el);
      gsap.fromTo(el,
        { y: -40, opacity: 0, rotate: 0 },
        {
          y: window.innerHeight + 60,
          x: (Math.random() * 200 - 100),
          opacity: 0.9,
          rotate: (Math.random() * 80 - 40),
          duration: 8 + Math.random() * 6,
          ease: 'none',
          onComplete: () => el.remove(),
        });
      gsap.to(el, { opacity: 0, duration: 1.5, delay: 6 + Math.random() * 4 });
    }

    let floatLoopId = null;
    function startFloatingHearts() {
      if (floatLoopId) return;
      floatLoopId = setInterval(spawnFloatingHeart, 900);
    }

    /* ---------- Master timeline ---------- */
    let sequenceStarted = false;

    function runMainSequence() {
      if (sequenceStarted) return;
      sequenceStarted = true;

      const treeData = buildTree();
      const segs = treeData.segs;
      preparePathDraw(segs);
      const words = buildHeadline();
      const chars = buildBodyText();
      // Prepare initial states
      gsap.set(words, { yPercent: 110 });
      gsap.set(chars, { opacity: 0, y: 12 });

      const tl = gsap.timeline();

      // 1. Intro out: heart shrinks and explodes
      tl.to(introHint, { opacity: 0, y: -10, duration: 0.4, ease: 'power2.in' })
        .to(introHeart, {
          scale: 1.5,
          duration: 0.45,
          ease: 'power2.in',
        }, '<')
        .to(introHeart, {
          scale: 0,
          opacity: 0,
          duration: 0.55,
          ease: 'power3.in',
        })
        .to(intro, { opacity: 0, duration: 0.45, ease: 'power2.out', onComplete: () => intro.style.display = 'none' }, '<0.1');

      // 2. Reveal scene container
      tl.to(scene, { opacity: 1, duration: 0.6, ease: 'power2.out' }, '-=0.2');

      // 3. Draw trunk + branches with stagger
      tl.add(() => {
        gsap.set(ground, { scaleX: 0 });
      });
      tl.to(ground, { scaleX: 1, duration: 0.9, ease: 'power2.out' }, '-=0.3');

      // Draw segments level by level — parents complete before children start
      const byLevel = {};
      segs.forEach((s) => { (byLevel[s.level] = byLevel[s.level] || []).push(s); });
      const levels = Object.keys(byLevel).map(Number).sort((a, b) => a - b);
      let drawStart = '-=0.3';
      levels.forEach((lvl) => {
        const group = byLevel[lvl];
        const paths = group.map((s) => s.path);
        const dur = lvl === 0 ? 0.95 : Math.max(0.28, 0.7 - lvl * 0.07);
        tl.to(paths, {
          strokeDashoffset: 0,
          duration: dur,
          stagger: { each: Math.max(0.012, 0.06 - lvl * 0.008), from: 'start' },
          ease: lvl === 0 ? 'power2.out' : 'power1.out',
        }, drawStart);
        // Each level overlaps previous slightly for fluid growth feel
        drawStart = '-=' + (dur * 0.55).toFixed(2);
      });

      // 4. Place blooms but invisible, then stagger bloom in
      tl.add(() => {
        gsap.set(scene, { opacity: 1 });
      });
      tl.add(() => {
        const blooms = placeBlooms(treeData);
        gsap.set(blooms, { scale: 0, opacity: 0 });
        window.__blooms = blooms;
        window.__lastTreeData = treeData;
        gsap.to(blooms, {
          scale: 1,
          opacity: 1,
          duration: 0.9,
          ease: 'elastic.out(1, 0.55)',
          stagger: { each: 0.008, from: 'random' },
        });
        // gentle floating sway loop
        blooms.forEach((b) => {
          gsap.to(b, {
            y: '-=4',
            duration: 1.6 + Math.random() * 1.4,
            repeat: -1,
            yoyo: true,
            ease: 'sine.inOut',
            delay: Math.random() * 1.5,
          });
        });
      });

      tl.to({}, { duration: 1.6 });

      // 5. Reveal text - eyebrow, headline (word stagger), body (char stagger), counter, signature
      tl.to(eyebrow, { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, '-=1')
        .to(words, {
          yPercent: 0,
          duration: 0.85,
          stagger: 0.06,
          ease: 'power3.out',
        }, '-=0.6')
        .to(chars, {
          opacity: 1,
          y: 0,
          duration: 0.5,
          stagger: 0.012,
          ease: 'power2.out',
        }, '-=0.4')
        .to(counterCard, {
          opacity: 1,
          y: 0,
          duration: 0.7,
          ease: 'power2.out',
        }, '-=0.3')
        .to(signature, {
          opacity: 1,
          duration: 0.7,
          ease: 'power2.out',
        }, '-=0.2');

      // 6. Begin falling hearts loop after a small pause
      tl.add(() => {
        startFallingLeaves();
        startFloatingHearts();
      }, '+=0.4');
    }

    /* ---------- Leaves falling occasionally ---------- */
    let fallId = null;
    function startFallingLeaves() {
      if (fallId) return;
      fallId = setInterval(() => {
        const pool = (window.__blooms || []).filter((b) => !b.dataset.fallen && Math.random() < 0.4);
        if (!pool.length) return;
        const picks = pool.sort(() => Math.random() - 0.5).slice(0, 2);
        picks.forEach((el) => {
          el.dataset.fallen = '1';
          const zoneRect = treeZone.getBoundingClientRect();
          const elRect = el.getBoundingClientRect();
          const groundY = (zoneRect.bottom - 30) - elRect.top;
          const driftX = (Math.random() * 160 - 80);
          const dur = 2.4 + Math.random() * 2.2;
          gsap.to(el, {
            x: driftX,
            y: groundY,
            rotate: (Math.random() * 280 - 140),
            duration: dur,
            ease: 'power1.in',
            onComplete: () => el.classList.add('fallen'),
          });
        });
      }, 900);
    }

    /* ---------- Init ---------- */
    buildStars();
    buildBokeh();
    animateIntro();

    let kickoff = () => {
      runMainSequence();
      intro.removeEventListener('pointerdown', kickoff);
      intro.removeEventListener('touchstart', kickoff);
      intro.removeEventListener('click', kickoff);
      window.removeEventListener('keydown', kickoff);
    };
    intro.addEventListener('pointerdown', kickoff, { passive: true });
    intro.addEventListener('touchstart', kickoff, { passive: true });
    intro.addEventListener('click', kickoff);
    window.addEventListener('keydown', kickoff);

    // Auto-kick after a few seconds for accessibility
    setTimeout(() => { if (!sequenceStarted) kickoff(); }, 4500);

    // Counter ticks regardless of intro state
    updateCounter();
    setInterval(updateCounter, 250);

    // Re-sync blooms on resize (re-place them)
    let resizeT = null;
    window.addEventListener('resize', () => {
      if (!window.__lastTreeData) return;
      clearTimeout(resizeT);
      resizeT = setTimeout(() => {
        (window.__blooms || []).forEach((b) => b.remove());
        const blooms = placeBlooms(window.__lastTreeData);
        window.__blooms = blooms;
        gsap.set(blooms, { scale: 1, opacity: 1 });
      }, 250);
    });
  </script>
</body>
