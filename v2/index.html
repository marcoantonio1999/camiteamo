<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Camila · GSAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #1a0612;
      --bg-2: #2b0a1f;
      --bg-3: #3a0d27;
      --accent: #ff4f7d;
      --accent-2: #ff7aa2;
      --accent-soft: #ffd1de;
      --gold: #ffd9a8;
      --text: #fff3f6;
      --text-soft: #f3c9d4;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: radial-gradient(120% 80% at 50% 0%, var(--bg-3) 0%, var(--bg-2) 45%, var(--bg-1) 100%);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .stars,
    .bokeh,
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars { z-index: 0; }
    .bokeh { z-index: 1; }
    .vignette {
      z-index: 2;
      background:
        radial-gradient(60% 60% at 50% 35%, transparent 0%, rgba(8, 2, 8, 0.55) 100%),
        radial-gradient(120% 120% at 50% 100%, rgba(255, 79, 125, 0.08) 0%, transparent 60%);
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.6;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.7);
    }

    .bokeh-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 153, 184, 0.55), rgba(255, 79, 125, 0));
      filter: blur(1px);
    }

    .stage {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    /* INTRO ------------------------------------------------------- */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 28px;
      background: radial-gradient(60% 60% at 50% 50%, rgba(255, 79, 125, 0.18), transparent 70%);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .intro-heart {
      width: 150px;
      height: 150px;
      filter: drop-shadow(0 0 30px rgba(255, 79, 125, 0.55));
      animation: introPulse 1.6s ease-in-out infinite;
    }
    .intro-heart svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }
    @keyframes introPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .intro-hint {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      color: var(--text-soft);
      letter-spacing: 0.04em;
      opacity: 0.85;
    }

    .intro-hint span {
      display: inline-block;
      will-change: transform, opacity;
    }

    /* MAIN ------------------------------------------------------- */
    .scene {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 28px;
      align-items: center;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 10px 4px;
    }

    .eyebrow {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      color: var(--accent-2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
    }

    .headline {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      line-height: 1.18;
      color: #fff;
      margin: 0;
      letter-spacing: 0.005em;
      text-wrap: balance;
      opacity: 0;
    }

    .headline .word {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
    }
    .headline .word-inner {
      display: inline-block;
      will-change: transform;
    }

    .headline em,
    .headline .word.em .word-inner {
      color: var(--accent-2);
      font-style: italic;
      font-weight: 500;
    }

    .body-text {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.55;
      color: var(--text-soft);
      max-width: 460px;
      margin: 0;
      opacity: 0;
    }

    .body-text .char { display: inline-block; will-change: transform, opacity; }

    .counter-card {
      margin-top: 6px;
      padding: 18px 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 79, 125, 0.16), rgba(255, 121, 162, 0.05));
      border: 1px solid rgba(255, 209, 222, 0.18);
      backdrop-filter: blur(6px);
      max-width: 460px;
      opacity: 0;
    }

    .counter-label {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--accent-soft);
      margin: 0 0 8px;
      letter-spacing: 0.02em;
    }

    .counter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .counter-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .counter-num {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: clamp(1.3rem, 3vw, 1.7rem);
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .counter-unit {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-soft);
      opacity: 0.75;
    }

    .signature {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--accent-2);
      letter-spacing: 0.05em;
      opacity: 0;
    }

    /* TREE ------------------------------------------------------- */
    .tree-zone {
      position: relative;
      height: min(620px, 78vh);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .tree-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .tree-svg path {
      fill: none;
      stroke: #5a3320;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ground {
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 209, 222, 0.55) 30%, rgba(255, 209, 222, 0.55) 70%, transparent);
      transform-origin: center;
      transform: scaleX(0);
    }

    .bloom {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      will-change: transform, opacity;
      filter: drop-shadow(0 2px 5px rgba(255, 30, 80, 0.4));
    }
    .bloom svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .bloom.fallen {
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.3)) saturate(0.75) brightness(0.9);
    }

    .floating-heart {
      position: fixed;
      width: 14px;
      height: 14px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      filter: drop-shadow(0 0 6px rgba(255, 122, 162, 0.5));
    }
    .floating-heart svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    @media (max-width: 760px) {
      .scene {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .tree-zone {
        order: -1;
        height: min(440px, 52vh);
      }
      .panel {
        padding: 0 6px 24px;
      }
      .stage {
        padding: 30px 14px 50px;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="bokeh" id="bokeh" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="intro" id="intro" role="button" aria-label="Comenzar">
    <div class="intro-heart" id="introHeart">
      <svg viewBox="0 0 32 28" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="introGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff7aa2"/>
            <stop offset="100%" stop-color="#c8204c"/>
          </linearGradient>
        </defs>
        <path d="M16 26 C 16 26, 2 17, 2 9 C 2 4, 6 1, 10 1 C 13 1, 15 3, 16 5 C 17 3, 19 1, 22 1 C 26 1, 30 4, 30 9 C 30 17, 16 26, 16 26 Z" fill="url(#introGrad)" />
      </svg>
    </div>
    <div class="intro-hint" id="introHint">
      <span>toca el corazón</span>
    </div>
  </div>

  <main class="stage">
    <section class="scene" id="scene">
      <div class="panel">
        <span class="eyebrow" id="eyebrow">17 · 01 · 2026</span>
        <h1 class="headline" id="headline">Para Camila, <em>el amor de mi vida</em>.</h1>
        <p class="body-text" id="bodyText">Si pudiera elegir un lugar seguro, sería contigo. Eres lo más bonito que tengo, y cada segundo a tu lado florece.</p>

        <div class="counter-card" id="counterCard">
          <p class="counter-label">Te amo desde hace</p>
          <div class="counter-grid">
            <div class="counter-cell"><span class="counter-num" id="cDays">0</span><span class="counter-unit">días</span></div>
            <div class="counter-cell"><span class="counter-num" id="cHours">0</span><span class="counter-unit">horas</span></div>
            <div class="counter-cell"><span class="counter-num" id="cMins">0</span><span class="counter-unit">min</span></div>
            <div class="counter-cell"><span class="counter-num" id="cSecs">0</span><span class="counter-unit">seg</span></div>
          </div>
        </div>

        <span class="signature" id="signature">— y siempre tuyo</span>
      </div>

      <div class="tree-zone" id="treeZone">
        <svg class="tree-svg" id="treeSvg" viewBox="0 0 400 600" preserveAspectRatio="xMidYMax meet" aria-hidden="true"></svg>
        <div class="ground" id="ground"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    /* ===========================================================
       Romantic GSAP scene · v2 for Camila
       =========================================================== */
    const intro = document.getElementById('intro');
    const introHeart = document.getElementById('introHeart');
    const introHint = document.getElementById('introHint');
    const scene = document.getElementById('scene');
    const headline = document.getElementById('headline');
    const bodyText = document.getElementById('bodyText');
    const eyebrow = document.getElementById('eyebrow');
    const counterCard = document.getElementById('counterCard');
    const signature = document.getElementById('signature');
    const treeZone = document.getElementById('treeZone');
    const treeSvg = document.getElementById('treeSvg');
    const ground = document.getElementById('ground');

    /* ---------- Background ---------- */
    function buildStars() {
      const container = document.getElementById('stars');
      const count = window.innerWidth < 700 ? 30 : 50;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        const size = Math.random() * 2 + 1;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.opacity = (Math.random() * 0.6 + 0.2).toFixed(2);
        container.appendChild(s);
        // Only animate half of them
        if (i % 2 === 0) {
          gsap.to(s, {
            opacity: '+=0.4',
            duration: 1.8 + Math.random() * 2.5,
            repeat: -1,
            yoyo: true,
            ease: 'sine.inOut',
            delay: Math.random() * 2,
          });
        }
      }
    }

    function buildBokeh() {
      const container = document.getElementById('bokeh');
      const count = window.innerWidth < 700 ? 6 : 10;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.className = 'bokeh-dot';
        const size = 14 + Math.random() * 26;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.top = Math.random() * 100 + '%';
        dot.style.opacity = (Math.random() * 0.4 + 0.2).toFixed(2);
        container.appendChild(dot);
        gsap.to(dot, {
          y: (Math.random() * 60 - 30),
          x: (Math.random() * 40 - 20),
          duration: 8 + Math.random() * 6,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut',
        });
      }
    }

    /* ---------- Intro animation (entrance only; idle pulse is CSS) ---------- */
    function animateIntro() {
      if (typeof gsap === 'undefined') return;
      gsap.from(introHeart, { scale: 0.6, opacity: 0, duration: 0.8, ease: 'back.out(1.8)' });
      gsap.from(introHint, { y: 14, opacity: 0, duration: 0.6, delay: 0.25, ease: 'power2.out' });
    }

    /* ---------- Procedural fractal tree ---------- */
    /*
      Recursive generation of branches as cubic-bezier SVG paths.
      Each segment knows its parent and depth; we draw level by level
      (parents before children) for an organic growth feel.
    */
    function makeRng(seed) {
      let t = seed >>> 0;
      return function () {
        t += 0x6D2B79F5;
        let n = Math.imul(t ^ (t >>> 15), 1 | t);
        n ^= n + Math.imul(n ^ (n >>> 7), 61 | n);
        return ((n ^ (n >>> 14)) >>> 0) / 4294967296;
      };
    }

    function buildTree() {
      treeSvg.innerHTML = '';
      const rng = makeRng(20260117);
      const segs = [];
      const MAX_LEVEL = 5;

      function branch(x0, y0, len, angle, width, level, parentIdx) {
        if (level > MAX_LEVEL || len < 6) return;
        const x1 = x0 + Math.cos(angle) * len;
        const y1 = y0 - Math.sin(angle) * len;

        const perpX = -Math.sin(angle);
        const perpY = -Math.cos(angle);
        const bend = (rng() - 0.5) * len * 0.22;
        const c1x = x0 + Math.cos(angle) * len * 0.4 + perpX * bend;
        const c1y = y0 - Math.sin(angle) * len * 0.4 + perpY * bend;
        const c2x = x0 + Math.cos(angle) * len * 0.75 + perpX * bend * 0.5;
        const c2y = y0 - Math.sin(angle) * len * 0.75 + perpY * bend * 0.5;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${x0.toFixed(1)} ${y0.toFixed(1)} C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${x1.toFixed(1)} ${y1.toFixed(1)}`);
        path.setAttribute('stroke-width', width.toFixed(2));
        const tone = Math.max(30, 70 - level * 7);
        path.setAttribute('stroke', `rgb(${tone + 28}, ${tone + 16}, ${tone})`);
        treeSvg.appendChild(path);
        const idx = segs.length;
        segs.push({ path, level, parentIdx, end: { x: x1, y: y1 } });

        if (level >= MAX_LEVEL) return;
        const splits = 2;
        const spread = level < 2 ? 0.6 : 0.85;
        for (let i = 0; i < splits; i++) {
          const offset = i - (splits - 1) / 2;
          const childAngle = angle + offset * spread + (rng() - 0.5) * 0.2;
          const childLen = len * (0.7 + rng() * 0.12);
          const childWidth = Math.max(0.9, width * 0.68);
          branch(x1, y1, childLen, childAngle, childWidth, level + 1, idx);
        }
      }

      branch(200, 580, 130, Math.PI / 2 + 0.02, 14, 0, -1);
      const hasChild = new Set();
      segs.forEach((s) => { if (s.parentIdx >= 0) hasChild.add(s.parentIdx); });
      segs.forEach((s, i) => { s.isTip = !hasChild.has(i); });

      return { segs };
    }

    function preparePathDraw(segs) {
      segs.forEach((seg) => {
        const len = seg.path.getTotalLength();
        seg.path.style.strokeDasharray = len;
        seg.path.style.strokeDashoffset = len;
        seg.path.style.fill = 'none';
        seg.path.setAttribute('stroke-linecap', 'round');
        seg.path.setAttribute('stroke-linejoin', 'round');
        seg.length = len;
      });
    }

    /* ---------- Bloom (heart leaves) ---------- */
    const HEART_PALETTES = [
      ['#ff5a85', '#b62049'],
      ['#ff7aa2', '#c93f6b'],
      ['#ff95b6', '#d75f81'],
      ['#ff3d68', '#9c1235'],
    ];
    const HEART_PATH = 'M16 26 C 16 26, 2 17, 2 9 C 2 4, 6 1, 10 1 C 13 1, 15 3, 16 5 C 17 3, 19 1, 22 1 C 26 1, 30 4, 30 9 C 30 17, 16 26, 16 26 Z';
    let heartUid = 0;
    function appendHeart(el) {
      const p = HEART_PALETTES[(Math.random() * HEART_PALETTES.length) | 0];
      const gid = 'g' + (++heartUid);
      el.innerHTML = `<svg viewBox="0 0 32 28" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${p[0]}"/><stop offset="100%" stop-color="${p[1]}"/></linearGradient></defs><path d="${HEART_PATH}" fill="url(#${gid})"/></svg>`;
    }

    function placeBlooms(treeData) {
      const { segs } = treeData;
      const tipSegs = segs.filter((s) => s.isTip);
      const candidatePoints = [];

      // Hearts at every tip
      tipSegs.forEach((seg) => candidatePoints.push({ x: seg.end.x, y: seg.end.y }));

      // A few hearts along the most upward (last-level) branches
      segs.filter((s) => s.level >= 3 && !s.isTip).forEach((seg) => {
        const len = seg.path.getTotalLength();
        const p = seg.path.getPointAtLength(len * 0.7);
        candidatePoints.push({ x: p.x, y: p.y });
      });

      // Sparse canopy filler — kept low for performance
      let minX = 400, maxX = 0, minY = 600, maxY = 0;
      tipSegs.forEach((s) => {
        if (s.end.x < minX) minX = s.end.x;
        if (s.end.x > maxX) maxX = s.end.x;
        if (s.end.y < minY) minY = s.end.y;
        if (s.end.y > maxY) maxY = s.end.y;
      });
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const rx = (maxX - minX) / 2 * 0.85;
      const ry = (maxY - minY) / 2 * 0.85;
      for (let i = 0; i < 22; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random());
        const x = cx + Math.cos(a) * rx * r;
        const y = cy + Math.sin(a) * ry * r;
        candidatePoints.push({ x, y, filler: true });
      }

      // Convert SVG coords to pixel positions relative to tree-zone
      const zoneRect = treeZone.getBoundingClientRect();
      const svgRect = treeSvg.getBoundingClientRect();
      const scaleX = svgRect.width / 400;
      const scaleY = svgRect.height / 600;
      const offsetX = svgRect.left - zoneRect.left;
      const offsetY = svgRect.top - zoneRect.top;

      const blooms = [];
      const frag = document.createDocumentFragment();
      candidatePoints.forEach((p) => {
        const el = document.createElement('div');
        el.className = 'bloom';
        const size = (p.filler ? 11 : 14) + Math.random() * 8;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        const jx = (Math.random() * 2 - 1) * (p.filler ? 16 : 8);
        const jy = (Math.random() * 2 - 1) * (p.filler ? 16 : 8);
        const px = offsetX + p.x * scaleX + jx;
        const py = offsetY + p.y * scaleY + jy;
        el.style.left = (px - size / 2) + 'px';
        el.style.top = (py - size / 2) + 'px';
        appendHeart(el);
        frag.appendChild(el);
        blooms.push(el);
      });
      treeZone.appendChild(frag);
      return blooms;
    }

    /* ---------- Text reveal helpers (read existing DOM) ---------- */
    function wrapWords(rootEl) {
      const out = [];
      function walk(node, isEm) {
        if (node.nodeType === Node.TEXT_NODE) {
          const tokens = node.nodeValue.split(/(\s+)/);
          const frag = document.createDocumentFragment();
          tokens.forEach((t) => {
            if (!t) return;
            if (/^\s+$/.test(t)) {
              frag.appendChild(document.createTextNode(t));
              return;
            }
            const word = document.createElement('span');
            word.className = 'word';
            const inner = document.createElement('span');
            inner.className = 'word-inner';
            inner.textContent = t;
            word.appendChild(inner);
            if (isEm) word.classList.add('em');
            frag.appendChild(word);
            out.push(inner);
          });
          node.parentNode.replaceChild(frag, node);
        } else if (node.nodeType === Node.ELEMENT_NODE) {
          const childIsEm = isEm || node.tagName === 'EM';
          const kids = Array.from(node.childNodes);
          kids.forEach((c) => walk(c, childIsEm));
        }
      }
      walk(rootEl, false);
      return out;
    }

    /* ---------- Counter ---------- */
    const startDate = new Date(2025, 10, 7, 0, 0, 0, 0);
    const cDays = document.getElementById('cDays');
    const cHours = document.getElementById('cHours');
    const cMins = document.getElementById('cMins');
    const cSecs = document.getElementById('cSecs');
    let lastVals = { d: -1, h: -1, m: -1, s: -1 };

    function pop(el) {
      gsap.fromTo(el,
        { scale: 1.18, color: '#ffd9a8' },
        { scale: 1, color: '#ffffff', duration: 0.55, ease: 'power2.out' });
    }

    function updateCounter() {
      const now = new Date();
      let diff = Math.max(0, now - startDate);
      const dayMs = 86400000;
      const hourMs = 3600000;
      const minuteMs = 60000;
      const d = Math.floor(diff / dayMs); diff %= dayMs;
      const h = Math.floor(diff / hourMs); diff %= hourMs;
      const m = Math.floor(diff / minuteMs); diff %= minuteMs;
      const s = Math.floor(diff / 1000);
      if (d !== lastVals.d) { cDays.textContent = d; pop(cDays); lastVals.d = d; }
      if (h !== lastVals.h) { cHours.textContent = h; pop(cHours); lastVals.h = h; }
      if (m !== lastVals.m) { cMins.textContent = m; pop(cMins); lastVals.m = m; }
      if (s !== lastVals.s) { cSecs.textContent = s; pop(cSecs); lastVals.s = s; }
    }

    /* ---------- Floating hearts loop ---------- */
    function spawnFloatingHeart() {
      const el = document.createElement('div');
      el.className = 'floating-heart';
      appendHeart(el);
      const size = 9 + Math.random() * 11;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      const startX = Math.random() * window.innerWidth;
      el.style.left = startX + 'px';
      el.style.top = (-30) + 'px';
      document.body.appendChild(el);
      gsap.fromTo(el,
        { y: -40, opacity: 0, rotate: 0 },
        {
          y: window.innerHeight + 60,
          x: (Math.random() * 200 - 100),
          opacity: 0.9,
          rotate: (Math.random() * 80 - 40),
          duration: 8 + Math.random() * 6,
          ease: 'none',
          onComplete: () => el.remove(),
        });
      gsap.to(el, { opacity: 0, duration: 1.5, delay: 6 + Math.random() * 4 });
    }

    let floatLoopId = null;
    function startFloatingHearts() {
      if (floatLoopId) return;
      floatLoopId = setInterval(spawnFloatingHeart, 1800);
    }

    /* ---------- Master timeline ---------- */
    let sequenceStarted = false;

    function runMainSequence() {
      if (sequenceStarted) return;
      sequenceStarted = true;
      try {
        _runMainSequence();
      } catch (err) {
        console.error('runMainSequence error', err);
        // Always make sure the user sees the page
        intro.style.display = 'none';
        scene.style.opacity = '1';
      }
    }

    function _runMainSequence() {
      const treeData = buildTree();
      const segs = treeData.segs;
      preparePathDraw(segs);
      const words = wrapWords(headline);
      gsap.set(words, { yPercent: 110 });

      const tl = gsap.timeline();

      // 1. Intro out
      tl.to(introHeart, { scale: 0.4, opacity: 0, duration: 0.45, ease: 'power3.in' })
        .to(intro, { opacity: 0, duration: 0.35, ease: 'power2.out', onComplete: () => intro.style.display = 'none' }, '-=0.1');

      // 2. Ground line
      tl.from(ground, { scaleX: 0, duration: 0.7, ease: 'power2.out' }, '-=0.2');

      // 3. Draw tree level by level
      const byLevel = {};
      segs.forEach((s) => { (byLevel[s.level] = byLevel[s.level] || []).push(s); });
      const levels = Object.keys(byLevel).map(Number).sort((a, b) => a - b);
      let drawStart = '-=0.4';
      levels.forEach((lvl) => {
        const paths = byLevel[lvl].map((s) => s.path);
        const dur = lvl === 0 ? 0.45 : Math.max(0.16, 0.32 - lvl * 0.03);
        tl.to(paths, {
          strokeDashoffset: 0,
          duration: dur,
          ease: lvl === 0 ? 'power2.out' : 'power1.out',
        }, drawStart);
        drawStart = '-=' + (dur * 0.4).toFixed(2);
      });

      // 4. Blooms
      tl.add(() => {
        const blooms = placeBlooms(treeData);
        gsap.set(blooms, { scale: 0 });
        window.__blooms = blooms;
        window.__lastTreeData = treeData;
        gsap.to(blooms, {
          scale: 1,
          duration: 0.55,
          ease: 'back.out(1.6)',
          stagger: { each: 0.01, from: 'random' },
        });
      });

      // small pause so blooms finish before the text starts
      tl.to({}, { duration: 0.7 });

      // 5. Reveal text sequentially
      tl.to(eyebrow, { opacity: 1, duration: 0.5, ease: 'power2.out' })
        .to(headline, { opacity: 1, duration: 0.3, ease: 'power2.out' }, '-=0.25')
        .to(words, { yPercent: 0, duration: 0.7, stagger: 0.05, ease: 'power3.out' }, '<')
        .to(bodyText, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' }, '-=0.3')
        .to(counterCard, { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, '-=0.4')
        .to(signature, { opacity: 1, duration: 0.6, ease: 'power2.out' }, '-=0.3');

      // 6. Start ambient loops
      tl.add(() => {
        startFallingLeaves();
        startFloatingHearts();
      }, '+=0.4');
    }

    // Safety net: if anything stalls, reveal text after 9s
    setTimeout(() => {
      const els = [eyebrow, headline, bodyText, counterCard, signature];
      els.forEach((el) => {
        if (el && getComputedStyle(el).opacity === '0') {
          el.style.opacity = '1';
        }
      });
    }, 9000);

    /* ---------- Leaves falling occasionally ---------- */
    let fallId = null;
    function startFallingLeaves() {
      if (fallId) return;
      fallId = setInterval(() => {
        const pool = (window.__blooms || []).filter((b) => !b.dataset.fallen);
        if (!pool.length) return;
        const el = pool[Math.floor(Math.random() * pool.length)];
        el.dataset.fallen = '1';
        const zoneRect = treeZone.getBoundingClientRect();
        const elRect = el.getBoundingClientRect();
        const groundY = (zoneRect.bottom - 30) - elRect.top;
        const driftX = (Math.random() * 160 - 80);
        const dur = 2.6 + Math.random() * 2;
        gsap.to(el, {
          x: driftX,
          y: groundY,
          rotate: (Math.random() * 280 - 140),
          duration: dur,
          ease: 'power1.in',
          onComplete: () => el.classList.add('fallen'),
        });
      }, 1600);
    }

    /* ---------- Init ---------- */
    window.addEventListener('error', (e) => {
      console.error('Unhandled error:', e.message);
      if (intro) intro.style.display = 'none';
      if (scene) scene.style.opacity = '1';
    });

    try { buildStars(); } catch (e) { console.error(e); }
    try { buildBokeh(); } catch (e) { console.error(e); }
    try { animateIntro(); } catch (e) { console.error(e); }

    let kickoff = () => {
      runMainSequence();
      intro.removeEventListener('pointerdown', kickoff);
      intro.removeEventListener('touchstart', kickoff);
      intro.removeEventListener('click', kickoff);
      window.removeEventListener('keydown', kickoff);
    };
    intro.addEventListener('pointerdown', kickoff, { passive: true });
    intro.addEventListener('touchstart', kickoff, { passive: true });
    intro.addEventListener('click', kickoff);
    window.addEventListener('keydown', kickoff);

    // Auto-kick after a few seconds for accessibility
    setTimeout(() => { if (!sequenceStarted) kickoff(); }, 4500);

    // Counter ticks regardless of intro state
    updateCounter();
    setInterval(updateCounter, 250);

    // Re-sync blooms on resize (re-place them)
    let resizeT = null;
    window.addEventListener('resize', () => {
      if (!window.__lastTreeData) return;
      clearTimeout(resizeT);
      resizeT = setTimeout(() => {
        (window.__blooms || []).forEach((b) => b.remove());
        const blooms = placeBlooms(window.__lastTreeData);
        window.__blooms = blooms;
        gsap.set(blooms, { scale: 1, opacity: 1 });
      }, 250);
    });
  </script>
</body>
